catalogMode: prefer

ignoreWorkspaceRootCheck: true

shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - undici-types@6.20.0
  - undici-types@6.21.0
packages:
  - playground
  - docs
  - packages/*
  - examples/*
catalog:
  '@hairy/utils': ^1.47.0
  '@vitest/coverage-v8': ^4.0.18
  async-cache-fn: ^0.0.3
  axios: 1.3.3
catalogs:
  cli:
    '@antfu/eslint-config': ^7.6.1
    '@antfu/ni': ^28.2.0
    bumpp: ^10.4.1
    eslint: ^10.0.2
    lint-staged: ^16.3.2
    publint: ^0.3.16
    simple-git-hooks: ^2.13.1
    tsdown: ^0.17.3
    tsx: ^4.21.0
    typescript: ^5.9.3
    vite: ^7.3.1
  testing:
    vitest: ^4.0.18
    vitest-package-exports: ^1.2.0
    yaml: ^2.8.2
  utils:
    tinyexec: ^1.0.2
onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks
